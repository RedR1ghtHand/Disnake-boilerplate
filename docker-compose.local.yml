# Optional overlay: self-hosted MongoDB in Docker.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

services:
  bot:
    environment:
      MONGODB_URI: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data:
